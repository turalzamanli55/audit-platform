# Generated by EDRP — Enterprise DevOps & Release Platform
# Do not duplicate governance logic here — invoke npm scripts that call devopsEngine.
name: EDRP

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: edrp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validation Pipeline
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - name: Database governance
        run: npm run validate:database
      - name: EDRP operate (skip live reset in CI by default)
        run: npm run edrp:operate -- --skip-reset
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build
      - name: Upload EDRP artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: edrp-artifacts
          path: |
            src/lib/devops/data/artifacts/**
            src/lib/devops/data/snapshots/latest.json
          if-no-files-found: warn

  # Stages mirrored for visibility (same engine — not duplicated logic)
  stage-matrix:
    name: Stage contract
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      matrix:
        stage:
          - source_validation
          - migration_validation
          - sql_foundation_validation
          - schema_validation
          - supabase_types_validation
          - repository_validation
          - localization_validation
          - capability_validation
          - project_bible_sync
          - platform_readiness_sync
          - build_validation
          - unit_tests
          - integration_tests
          - governance_validation
          - ai_validation
          - release_validation
    steps:
      - run: echo "EDRP stage ${{ matrix.stage }} is enforced by devopsEngine pipeline"
