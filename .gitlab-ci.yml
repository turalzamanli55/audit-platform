# Generated by EDRP — GitLab CI
stages:
  - validate
  - build
  - release

variables:
  NODE_VERSION: "20"

default:
  image: node:${NODE_VERSION}
  cache:
    key: ${CI_COMMIT_REF_SLUG}
    paths:
      - node_modules/

edrp_validate:
  stage: validate
  script:
    - npm ci
    - npm run validate:database
    - npm run edrp:operate -- --skip-reset
    - npm run lint
    - npm run test
  artifacts:
    when: always
    paths:
      - src/lib/devops/data/
    expire_in: 14 days

edrp_build:
  stage: build
  needs: [edrp_validate]
  script:
    - npm ci
    - npm run build

edrp_release_gate:
  stage: release
  needs: [edrp_build]
  script:
    - npm ci
    - npx tsx scripts/validate-devops.mts
  only:
    - main
    - master
