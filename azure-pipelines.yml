# Generated by EDRP — Azure DevOps
trigger:
  - main
  - master

pr:
  - main
  - master

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Validate
    displayName: EDRP Validation
    jobs:
      - job: Pipeline
        timeoutInMinutes: 45
        steps:
          - task: NodeTool@0
            inputs:
              versionSpec: "20.x"
          - script: npm ci
            displayName: Install
          - script: npm run validate:database
            displayName: Database governance
          - script: npm run edrp:operate -- --skip-reset
            displayName: EDRP operate
          - script: npm run lint
            displayName: Lint
          - script: npm run test
            displayName: Tests
          - script: npm run build
            displayName: Build
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: src/lib/devops/data
              artifact: edrp-data
            condition: always()

  - stage: Staging
    displayName: Staging Gate
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: StagingApprove
        environment: staging
        strategy:
          runOnce:
            deploy:
              steps:
                - script: echo "Promote using EDRP release candidate artifacts"
